# ============================================================================
# nginx 站点配置 —— A股板块资金监控 / ETF 辅助分析
# ----------------------------------------------------------------------------
# 作用（DESIGN §0 / §10）：
#   1. 全站 Basic Auth（唯一鉴权层，FastAPI 本身无鉴权，见 DESIGN §0）
#   2. 强制 HTTPS（80 -> 443 跳转，仅放行 ACME 挑战路径）
#   3. 反代 /api/* 到本地 uvicorn（127.0.0.1:8000，API 仅监听回环，端口隔离）
#   4. 同源托管前端静态产物（frontend/dist，hash 路由无需 history fallback 特别处理）
#
# 部署步骤（详见 docs/ops.md）：
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/jcetf
#   sudo ln -sf /etc/nginx/sites-available/jcetf /etc/nginx/sites-enabled/jcetf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 修改点（上线前按需替换）：
#   - server_name：你的域名（默认 jiucaietf.icu）
#   - ssl_certificate / ssl_certificate_key：certbot 生成的路径
#   - auth_basic_user_file：htpasswd 文件路径
#   - root：前端构建产物目录（默认 /workspace/frontend/dist）
# ============================================================================

# 上游 API（回环地址，由 uvicorn 监听；不放公网，防火墙封 8000）
upstream etf_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---- 80 端口：仅用于 ACME 验证 + 全量跳转到 HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name jiucaietf.icu www.jiucaietf.icu;

    # Let's Encrypt  HTTP-01 挑战目录（certbot --webroot 用）
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    # 其余一律 301 跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 443 端口：主服务 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jiucaietf.icu www.jiucaietf.icu;

    # ---- TLS（certbot 申请，路径按域名替换）----
    ssl_certificate     /etc/letsencrypt/live/jiucaietf.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiucaietf.icu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- 安全响应头（与 FastAPI 内层响应头互补）----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # ---- 全站 Basic Auth（DESIGN §0：唯一鉴权层）----
    auth_basic           "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd_jcetf;

    # ---- 前端静态资源（Vite build 产物）----
    root /workspace/frontend/dist;
    index index.html;

    # 静态文件长缓存（带 hash 指纹的资源可长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- API 反代（保留 /api 前缀原样转发）----
    location /api/ {
        proxy_pass http://etf_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;   # 回测/批量接口可能较慢
        proxy_connect_timeout 10s;
    }

    # ---- 健康检查 / 文档（同上游，便于运维探测）----
    location ~ ^/(health|ready|docs|openapi.json|redoc)$ {
        proxy_pass http://etf_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        auth_basic off;   # 健康检查不拦（避免探测机被 401）
    }

    # ---- SPA 兜底：未知路径回退 index.html（hash 模式下仅兜底用）----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 限制请求体（内部工具，无需大上传）
    client_max_body_size 2m;
}
