# ============================================================================
# nginx 站点配置（临时版）—— 无域名 / 仅 IP 访问 / 纯 HTTP
# ----------------------------------------------------------------------------
# 用途：域名还没注册下来时，先用服务器公网 IP 通过 http://<IP>/ 看效果。
#       等域名就绪、证书申请成功后，换回 deploy/nginx.conf（启用 HTTPS）即可。
#
# 部署：
#   sudo cp deploy/nginx.http.conf /etc/nginx/sites-available/jcetf
#   sudo ln -sf /etc/nginx/sites-available/jcetf /etc/nginx/sites-enabled/jcetf
#   sudo rm -f /etc/nginx/sites-enabled/default   # 避免与默认站点冲突
#   sudo nginx -t && sudo systemctl reload nginx
# 浏览器访问： http://<你的服务器公网IP>/
#
# 注意：
#   - 纯 HTTP 下 Basic Auth 口令以 base64 明文传输，临时测试请勿用重要密码；
#     纯内网自测可注释掉下方 auth_basic 两行关闭登录。
#   - 云服务器（如腾讯云 CVM）还需在「安全组」放行入站 80 端口，否则公网打不开。
# ============================================================================

# 上游 API（回环地址，由 uvicorn 监听；不放公网，防火墙封 8000）
upstream etf_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;   # 无域名：下划线匹配任意 Host（含裸 IP）

    # 基础安全头（无 HTTPS 也先加上）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # 全站 Basic Auth（DESIGN §0：唯一鉴权层；纯内网自测可注释掉下面两行）
    auth_basic           "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd_jcetf;

    # 前端静态资源（Vite build 产物）
    root /workspace/frontend/dist;
    index index.html;

    # 静态文件长缓存（带 hash 指纹的资源可长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反代（保留 /api 前缀原样转发）
    location /api/ {
        proxy_pass http://etf_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 健康检查 / 文档（不拦，便于探测）
    location ~ ^/(health|ready|docs|openapi.json|redoc)$ {
        proxy_pass http://etf_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        auth_basic off;
    }

    # SPA 兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 2m;
}
